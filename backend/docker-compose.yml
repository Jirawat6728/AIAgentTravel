# รัน backend อย่างเดียว (ใช้ Mongo Atlas — ใส่ MONGODB_URI ใน .env)
# จากโฟลเดอร์ backend: docker compose up -d
# หมายเหตุ: สร้างไฟล์ .env ก่อน (คัดลอกจาก .env.example แล้วเติมค่า MONGODB_URI, GEMINI_API_KEY ฯลฯ)
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: aitravel-backend:latest
    container_name: aitravel_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
    volumes:
      - backend_sessions:/app/data/sessions
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8000), timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  backend_sessions:
  backend_logs:
